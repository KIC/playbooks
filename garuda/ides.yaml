
---
- name: Install Development Tools
  hosts: localhost
  become: yes
  vars:
    user_id: "{{ ansible_facts.env.SUDO_USER }}"
    aur_helper: "yay"
  tasks:
    - name: Install pacman software
      ansible.builtin.package:
        name:
          - sqlite3
          - visual-studio-code-bin
          - uv  # Python manager
          - nvm  # nodejs manager
          - npm
          - nodejs
          - gemini-cli
        state: present

    - name: configure vscode
      become: no
      shell: |
        code --install-extension rdnlsmith.linux-themes
        sed -i -e 's/"workbench.colorTheme": ".*"/"workbench.colorTheme": "Yaru"/g' "$HOME/.config/Code/User/settings.json"
        code --install-extension lisoveliy.starcoderex
        code --install-extension ms-vscode-remote.remote-containers
        code --install-extension ms-azuretools.vscode-docker
        code --install-extension ms-python.python
        code --install-extension isudox.vscode-jetbrains-keybindings
        code --install-extension hoovercj.vscode-power-mode

    - name: install kilo.ai cli
      ansible.builtin.shell: |
        npm install -g @kilocode/cli
        
    - name: install cursor and co from aur
      become: yes
      become_user: aur_builder
      kewlfft.aur.aur:
        name: "{{ item }}"
        state: present
        use: "{{ aur_helper }}"
        aur_only: yes
      loop:
        - jetbrains-toolbox
        - cursor-bin
        - snapd
        - claude-code

    - name: enable snapd
      systemd:
        name: snapd.socket
        state: started
        enabled: yes

    - name: symlink for classic snaps
      ansible.builtin.file:
        src: /var/lib/snapd/snap
        dest: /snap
        state: link
      become: yes

    - name: install extensions
      become: no
      ansible.builtin.shell: |
        gemini extensions install https://github.com/gemini-cli-extensions/conductor --auto-update --consent

  # TODO install adb android tools 
