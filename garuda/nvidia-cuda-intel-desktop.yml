---
- name: NVIDIA CUDA Compute-Only Setup for Garuda Sway (Intel Display)
  hosts: localhost
  become: yes
  gather_facts: yes
  vars:
    # Auto-detect system info
    intel_gpu_card: "{{ (ansible_facts.pci_cards | selectattr('vendor_id', 'equalto', '0x8086') | selectattr('device_id', 'search', 'VGA') | list | length > 0) | ternary('/dev/dri/card1', '/dev/dri/card0') }}"
    nvidia_gpu_card: "{{ (ansible_facts.pci_cards | selectattr('vendor_id', 'equalto', '0x10de') | selectattr('device_id', 'search', 'VGA') | list | first | default({})).device | default('card0') }}"
    
  pre_tasks:
    - name: Create Pre-NVIDIA snapshot
      shell: snapper -c root create --description "Pre-NVIDIA-CUDA-{{ ansible_facts.date_time.epoch }}"
      register: snapshot_pre
      changed_when: snapshot_pre.rc == 0

    - name: Update GRUB to include new snapshot
      shell: grub-mkconfig -o /boot/grub/grub.cfg
      when: snapshot_pre.rc == 0

  tasks:
    - name: Install NVIDIA compute packages (DKMS + CUDA stack)
      ansible.builtin.package:
        name:
          - nvidia-dkms
          - nvidia-utils
          - lib32-nvidia-utils
          - cuda
          - cudnn
          - opencl-nvidia
        state: present
        update_cache: yes
        extra_args: --noconfirm --needed
      register: nvidia_install

    - name: Configure NVIDIA for compute-only (no display modesetting)
      copy:
        dest: /etc/modprobe.d/nvidia-compute-only.conf
        content: |
          # NVIDIA Compute-only (display on Intel iGPU)
          options nvidia-drm modeset=0
          options nvidia_uvm enable=1
        backup: yes
      notify: regenerate initramfs

    - name: Disable NVIDIA power management conflicts (laptop)
      copy:
        dest: /etc/modprobe.d/nvidia-powersave.conf
        content: |
          # Laptop NVIDIA: disable power management conflicts
          options nvidia NVreg_PreserveVideoMemoryAllocations=1
          options nvidia NVreg_DynamicPowerManagement=0x02
        backup: yes
      notify: regenerate initramfs

    - name: Create NVIDIA compute launch script
      copy:
        dest: /usr/local/bin/nvidia-compute
        content: |
          #!/bin/bash
          # Launch NVIDIA compute apps (display stays on Intel)
          export __NV_PRIME_RENDER_OFFLOAD=1
          export __GLX_VENDOR_LIBRARY_NAME=nvidia
          export __VK_LAYER_NV_optimus=NVIDIA_only
          exec "$@"
        mode: '0755'
      register: compute_script

    - name: Create CUDA test script
      copy:
        dest: /usr/local/bin/test-nvidia-cuda
        content: |
          #!/bin/bash
          # Test NVIDIA CUDA compute (display stays Intel)
          echo "=== NVIDIA Compute Test ==="
          nvidia-smi
          echo
          echo "=== CUDA Version ==="
          nvcc --version | head -n3 || echo "nvcc not in PATH"
          echo
          echo "=== PRIME offload test ==="
          prime-run nvidia-smi || echo "PRIME offload failed"
        mode: '0755'

  handlers:
    - name: regenerate initramfs
      shell: echo ""
      
    - name: restart greetd
      systemd:
        name: greetd
        state: restarted
        daemon_reload: yes

  post_tasks:
    - name: Create Post-NVIDIA snapshot
      shell: snapper -c root create --description "Post-NVIDIA-CUDA-{{ ansible_facts.date_time.epoch }}"
      register: snapshot_post
      changed_when: snapshot_post.rc == 0

    - name: Test NVIDIA compute functionality
      shell: /usr/local/bin/test-nvidia-cuda
      register: cuda_test
      failed_when: false
      changed_when: false

    - name: Reboot warning
      debug:
        msg: |
          ⚠️  REBOOT REQUIRED for full NVIDIA initialization
          sudo reboot  # Safe - snapshots protect you!

